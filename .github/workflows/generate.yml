name: Generate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Generated Code Up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Generate
        run: task gen

      - name: Check for drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated code is out of date. Run 'task gen' and commit the result."
            exit 1
          fi
